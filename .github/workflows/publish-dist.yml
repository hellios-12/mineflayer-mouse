name: Build and publish dist

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g corepack && corepack enable
      - run: pnpm install
      - run: pnpm build
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan built
          git rm -rf --cached .
          git add -f dist package.json README.md 2>/dev/null || true
          git commit -m "build: publish dist for $(git rev-parse --short main)"
          git push origin built --force
