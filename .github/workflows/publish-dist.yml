name: Build and publish dist

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable corepack
        run: npm install -g corepack && corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish dist to built branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan built
          git rm -rf --cached .
          # keep only what a consumer needs: dist/, package.json, and any non-src runtime files
          git add -f dist package.json README.md 2>/dev/null || true
          git commit -m "build: publish dist for $(git rev-parse --short main)"
          git push origin built --force
